<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#f5f7fa">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MOBICA Capacity">
<title>MOBICA Assembly Capacity</title>
<link rel="manifest" id="manifest-placeholder">
<style>
  /* ── LIGHT THEME VARIABLES ── */
  :root {
    --bg:       #f0f2f5;
    --bg2:      #ffffff;
    --bg3:      #e8ecf0;
    --border:   #d0d7de;
    --text:     #1a1f2e;
    --text2:    #5a6270;
    --amber:    #c8880a;
    --amber2:   #f0a500;
    --amberBg:  #fff8e6;
    --green:    #1a7f37;
    --greenBg:  #dff0d8;
    --red:      #cf222e;
    --redBg:    #fce8e8;
    --warn:     #9a6700;
    --warnBg:   #fff3cd;
    --blue:     #0969da;
    --shadow:   0 1px 3px rgba(0,0,0,.10), 0 1px 8px rgba(0,0,0,.06);
    --radius:   10px;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    --font-ui:   'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); overflow: hidden; }

  /* ── LAYOUT ── */
  #app { display: flex; flex-direction: column; height: 100dvh; }
  #header {
    background: var(--bg2);
    border-bottom: 2px solid var(--border);
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  .logo { display: flex; align-items: center; gap: 0; }
  .logo img {
    height: 44px;
    width: auto;
    object-fit: contain;
    display: block;
  }
  .logo-divider {
    width: 1px; height: 32px; background: var(--border);
    margin: 0 12px;
  }
  .logo-sub-block { display: flex; flex-direction: column; justify-content: center; }
  .logo-sub-title { font-size: 16px; font-weight: 700; letter-spacing: 1px; color: var(--text); line-height: 1; }
  .logo-sub-label { font-size: 10px; color: var(--text2); letter-spacing: 0.5px; margin-top: 3px; text-transform: uppercase; }

  .sync-badge {
    font-family: var(--font-mono); font-size: 13px; padding: 5px 11px;
    border-radius: 20px; border: 1px solid var(--border); color: var(--text2);
    background: var(--bg3);
    display: flex; align-items: center; gap: 6px; cursor: pointer;
  }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  .sync-dot.offline { background: var(--red); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── CONTENT AREA ── */
  #content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }

  /* ── NAV ── */
  #nav {
    background: var(--bg2);
    border-top: 2px solid var(--border);
    display: grid; grid-template-columns: repeat(4, 1fr);
    flex-shrink: 0;
    box-shadow: 0 -2px 8px rgba(0,0,0,.06);
  }
  .nav-btn {
    background: none; border: none; color: var(--text2); padding: 12px 4px 14px;
    font-family: var(--font-ui); font-size: 14px; font-weight: 600; letter-spacing: .5px;
    display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer;
    transition: color .2s; text-transform: uppercase;
  }
  .nav-btn svg { width: 26px; height: 26px; stroke: currentColor; fill: none; stroke-width: 2; }
  .nav-btn.active { color: var(--amber); }
  .nav-btn.active svg { stroke: var(--amber); }

  /* ── VIEWS ── */
  .view { display: none; padding: 14px; animation: fadeIn .2s; }
  .view.active { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

  /* ── SECTION HEADER ── */
  .sec-hdr {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .sec-title { font-size: 27px; font-weight: 700; letter-spacing: 1px; color: var(--amber); text-transform: uppercase; }
  .sec-sub { font-size: 16px; color: var(--text2); margin-top: 2px; }

  /* ── DEPARTMENT CARDS (Dashboard) ── */
  .dept-grid { display: flex; flex-direction: column; gap: 10px; }
  .dept-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px; cursor: pointer; transition: border-color .2s, box-shadow .2s;
    border-left: 4px solid var(--border);
    box-shadow: var(--shadow);
  }
  .dept-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.12); border-color: var(--amber2); }
  .dept-card.ok     { border-left-color: var(--green); }
  .dept-card.warn   { border-left-color: var(--warn); }
  .dept-card.crit   { border-left-color: var(--red); }
  .dept-card.nodata { border-left-color: var(--border); }
  .dept-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .dept-name { font-size: 21px; font-weight: 700; letter-spacing: .5px; color: var(--text); }
  .dept-code { font-size: 14px; color: var(--text2); margin-top: 2px; }
  .ach-badge {
    font-family: var(--font-mono); font-size: 22px; font-weight: 700;
    padding: 3px 10px; border-radius: 6px;
  }
  .ach-badge.ok   { color: var(--green); background: var(--greenBg); }
  .ach-badge.warn { color: var(--warn);  background: var(--warnBg); }
  .ach-badge.crit { color: var(--red);   background: var(--redBg); }
  .ach-badge.nd   { color: var(--text2); background: var(--bg3); font-size: 16px; }
  .dept-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat-item { background: var(--bg3); border-radius: 6px; padding: 8px 10px; border: 1px solid var(--border); }
  .stat-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .4px; }
  .stat-val   { font-family: var(--font-mono); font-size: 19px; font-weight: 700; color: var(--text); margin-top: 3px; }
  .penalty-row { margin-top: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .penalty-tag {
    font-size: 14px; font-family: var(--font-mono);
    background: var(--redBg); color: var(--red);
    padding: 3px 9px; border-radius: 4px; border: 1px solid #f8514944;
    font-weight: 600;
  }
  .vacation-tag {
    font-size: 14px; font-family: var(--font-mono);
    background: var(--warnBg); color: var(--warn);
    padding: 3px 9px; border-radius: 4px; border: 1px solid #d2992244;
    font-weight: 600;
  }

  /* ── SUMMARY TOTALS BAR ── */
  .summary-bar {
    background: linear-gradient(135deg, #fff8e6, #fff3cd);
    border: 1px solid #f0c060; border-radius: var(--radius);
    padding: 14px; margin-bottom: 14px; display: grid; grid-template-columns: repeat(3,1fr); gap: 10px;
    box-shadow: var(--shadow);
  }
  .sum-item { text-align: center; }
  .sum-label { font-size: 13px; color: var(--warn); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
  .sum-val   { font-family: var(--font-mono); font-size: 27px; font-weight: 700; color: var(--amber); }

  /* ── ENTRY FORM ── */
  .form-dept-selector {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 14px;
  }
  .dept-sel-btn {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 10px; cursor: pointer;
    font-family: var(--font-ui); font-size: 16px; font-weight: 600;
    color: var(--text2); text-align: center; transition: all .15s;
    letter-spacing: .3px; box-shadow: var(--shadow);
  }
  .dept-sel-btn:hover { border-color: var(--amber2); color: var(--text); }
  .dept-sel-btn.active { background: var(--amber2); color: #000; border-color: var(--amber2); }

  .form-section {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .form-section-hdr {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    font-size: 15px; font-weight: 700; letter-spacing: 1px;
    color: var(--amber); text-transform: uppercase; display: flex;
    align-items: center; gap: 8px;
    background: var(--amberBg); border-radius: var(--radius) var(--radius) 0 0;
  }
  .form-section-hdr span { color: var(--text2); font-weight: 400; }
  .form-body { padding: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-row.single { grid-template-columns: 1fr; }
  .form-row.three  { grid-template-columns: 1fr 1fr 1fr; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 14px; color: var(--text2); text-transform: uppercase; letter-spacing: .4px; font-weight: 600; }
  .field input, .field select {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; color: var(--text);
    font-family: var(--font-mono); font-size: 18px;
    transition: border-color .15s, box-shadow .15s; -webkit-appearance: none;
  }
  .field input:focus, .field select:focus {
    outline: none; border-color: var(--amber2);
    box-shadow: 0 0 0 3px rgba(240,165,0,.15);
    background: #fff;
  }
  .field input[type=number] { text-align: right; }

  /* Model table in form */
  .model-table-wrap { overflow-x: auto; margin-top: 4px; }
  .model-table {
    width: 100%; border-collapse: collapse; font-size: 15px;
    font-family: var(--font-mono);
  }
  .model-table th {
    background: var(--bg3); padding: 8px 10px;
    text-align: center; color: var(--text2);
    font-size: 13px; letter-spacing: .5px; text-transform: uppercase;
    border-bottom: 2px solid var(--border); white-space: nowrap;
    font-weight: 700;
  }
  .model-table td { padding: 5px 4px; border-bottom: 1px solid var(--border); }
  .model-table td:first-child { color: var(--text); font-size: 14px; padding-left: 10px; white-space: nowrap; }
  .model-table input.tbl-inp {
    width: 80px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 4px; padding: 5px 8px; color: var(--text);
    font-family: var(--font-mono); font-size: 16px; text-align: right;
    -webkit-appearance: none;
  }
  .model-table input.tbl-inp:focus {
    border-color: var(--amber2); outline: none;
    box-shadow: 0 0 0 2px rgba(240,165,0,.2);
    background: #fff;
  }
  .kpw-cell { color: var(--text2); font-size: 14px; text-align: right; padding-right: 8px; }
  .prod-cell { color: var(--blue); font-weight: 700; text-align: right; padding-right: 8px; font-size: 15px; }
  .tbd-row td:first-child { color: var(--warn); }

  /* Live achievement meter */
  .live-meter {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; align-items: center;
    box-shadow: var(--shadow);
  }
  .meter-item { text-align: center; }
  .meter-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .3px; font-weight: 600; }
  .meter-val   { font-family: var(--font-mono); font-size: 24px; font-weight: 700; color: var(--text); margin-top: 4px; }
  .meter-val.ok   { color: var(--green); }
  .meter-val.warn { color: var(--warn); }
  .meter-val.crit { color: var(--red); }

  /* Progress bar */
  .ach-bar-wrap { grid-column: 1/-1; }
  .ach-bar-bg { background: var(--bg3); border-radius: 4px; height: 8px; overflow: hidden; margin-top: 4px; border: 1px solid var(--border); }
  .ach-bar-fg { height: 100%; border-radius: 4px; transition: width .4s, background .4s; }

  /* Buttons */
  .btn {
    border: none; border-radius: 8px; padding: 14px 22px;
    font-family: var(--font-ui); font-size: 18px; font-weight: 700;
    letter-spacing: .5px; cursor: pointer; transition: opacity .15s, box-shadow .15s;
    text-transform: uppercase;
  }
  .btn:active { opacity: .8; }
  .btn-primary { background: var(--amber2); color: #000; width: 100%; box-shadow: 0 2px 8px rgba(240,165,0,.3); }
  .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-danger   { background: var(--redBg); color: var(--red); border: 1px solid #f8514944; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }

  /* ── HISTORY VIEW ── */
  .hist-filter { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
  .hist-filter select, .hist-filter input {
    flex: 1; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; color: var(--text);
    font-family: var(--font-ui); font-size: 16px; -webkit-appearance: none;
    box-shadow: var(--shadow);
  }
  .hist-list { display: flex; flex-direction: column; gap: 8px; }
  .hist-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 10px;
    box-shadow: var(--shadow);
  }
  .hist-date { font-size: 14px; color: var(--text2); margin-bottom: 3px; }
  .hist-dept { font-size: 19px; font-weight: 700; color: var(--text); }
  .hist-stats-row { display: flex; gap: 12px; margin-top: 6px; flex-wrap: wrap; }
  .hist-stat { font-size: 14px; color: var(--text2); }
  .hist-stat strong { font-family: var(--font-mono); color: var(--text); }

  /* ── SCORE VIEW ── */
  .score-table-wrap { overflow: hidden; }
  .score-row {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px; margin-bottom: 8px;
    display: grid; grid-template-columns: 30px 1fr auto auto;
    align-items: center; gap: 10px;
    box-shadow: var(--shadow);
  }
  .score-rank { font-family: var(--font-mono); font-size: 16px; color: var(--text2); font-weight: 700; }
  .score-dept-name { font-size: 19px; font-weight: 700; color: var(--text); }
  .score-ach { font-family: var(--font-mono); font-size: 21px; font-weight: 700; }
  .score-pen { font-family: var(--font-mono); font-size: 18px; color: var(--red); text-align: right; font-weight: 600; }
  .score-pen.zero { color: var(--text2); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 24px; padding: 10px 22px; font-size: 16px;
    white-space: nowrap; opacity: 0; transition: all .3s; pointer-events: none; z-index: 999;
    box-shadow: 0 4px 16px rgba(0,0,0,.15); color: var(--text);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.error { border-color: var(--red); color: var(--red); background: var(--redBg); }
  #toast.success { border-color: var(--green); color: var(--green); background: var(--greenBg); }

  /* ── SPINNER ── */
  .spinner {
    width: 28px; height: 28px; border: 3px solid var(--border);
    border-top-color: var(--amber2); border-radius: 50%;
    animation: spin .7s linear infinite; margin: 24px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 48px 20px; color: var(--text2); font-size: 18px; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.35); z-index: 100; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px 16px 0 0; padding: 22px 18px 36px;
    width: 100%; max-height: 70dvh; overflow-y: auto;
    animation: slideUp .25s ease;
    box-shadow: 0 -4px 24px rgba(0,0,0,.12);
  }
  @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-title { font-size: 22px; font-weight: 700; color: var(--amber); margin-bottom: 16px; letter-spacing: .5px; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── DATE BADGE ── */
  .date-badge {
    background: var(--amberBg); border: 1px solid #f0c060;
    border-radius: 6px; padding: 4px 12px; font-family: var(--font-mono);
    font-size: 15px; color: var(--warn); font-weight: 600;
  }

  /* ── SCORE OK badge override ── */
  .score-ach.ok   { color: var(--green); }
  .score-ach.warn { color: var(--warn); }
  .score-ach.crit { color: var(--red); }
  .score-ach.nd   { color: var(--text2); }
</style>
</head>

          <div class="sec-sub" id="dashDate"></div>
        </div>
        <div class="date-badge" id="dashPeriod">—</div>
      </div>
      <div class="summary-bar" id="summaryBar">
        <div class="sum-item"><div class="sum-label">Depts Active</div><div class="sum-val" id="sumDepts">—</div></div>
        <div class="sum-item"><div class="sum-label">Avg Achievement</div><div class="sum-val" id="sumAch">—</div></div>

      </div>
    </div>

      <div class="sec-hdr">
        <div>

        </div>
      </div>

      <div class="form-dept-selector" id="formDeptSelector"></div>

      <div class="live-meter" id="liveMeter">

        <div class="meter-item"><div class="meter-label">Available</div><div class="meter-val" id="mAvail">—</div></div>
        <div class="meter-item"><div class="meter-label">Achievement</div><div class="meter-val" id="mAch">—</div></div>

        </div>
      </div>

      <!-- Date & Workers -->
      <div class="form-section">
        <div class="form-section-hdr">📅 Period &amp; Workers</div>
        <div class="form-body">
          <div class="form-row">
            <div class="field">
              <label>Entry Date</label>
              <input type="date" id="fDate">
            </div>
            <div class="field">
              <label>Working Days</label>
              <input type="number" id="fWorkDays" min="0" max="31" step="0.5" placeholder="17.9">
            </div>
          </div>
          <div class="form-row three">
            <div class="field">
              <label>Available Workers</label>
              <input type="number" id="fAvail" min="0" step="1" placeholder="16">
            </div>
            <div class="field">
              <label>Overtime Shifts</label>
              <input type="number" id="fOT" min="0" step="0.5" placeholder="0">
            </div>
            <div class="field">
              <label>Vacations</label>
              <input type="number" id="fVac" min="0" step="0.5" placeholder="0">
            </div>
          </div>
          <div class="form-row">
            <div class="field">
              <label>All-In Shifts (received)</label>
              <input type="number" id="fAllIn" min="0" step="0.5" placeholder="0">
            </div>
            <div class="field">
              <label>All-Out Shifts (sent)</label>
              <input type="number" id="fAllOut" min="0" step="0.5" placeholder="0">
            </div>
          </div>
          <div class="form-row single">
            <div class="field">
              <label>Notes (optional)</label>
              <input type="text" id="fNotes" placeholder="e.g. Ramadan schedule, line stoppage…">
            </div>
          </div>
        </div>
      </div>

      <!-- Model production table -->
      <div class="form-section">
        <div class="form-section-hdr">🏭 Production — <span id="formDeptLabel">Select department above</span></div>
        <div class="form-body" style="padding:0">
          <div class="model-table-wrap" id="modelTableWrap">
            <div style="padding:24px;text-align:center;color:var(--text2);font-size:16px;">Select a department to show models</div>
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-secondary" onclick="resetForm()">CLEAR</button>
        <button class="btn btn-primary" onclick="submitEntry()">SAVE ENTRY</button>
      </div>
      <div style="height:10px"></div>
    </div>

      <div class="sec-hdr">
        <div class="sec-title">History</div>
      </div>

    </div>

        <div>
          <div class="sec-title">Score Board</div>
          <div class="sec-sub" id="scoreMonth"></div>
        </div>
        <select id="scoreMonthSel" style="background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-family:var(--font-ui);font-size:15px;box-shadow:var(--shadow);" onchange="loadScoreboard()"></select>

      <div id="scoreList"><div class="spinner"></div></div>
    </div>

// ══════════════════════════════════════════════
//  SUPABASE FETCH WRAPPER
// ══════════════════════════════════════════════
async function sbFetch(path, opts={}) {
  const url = `${SB_URL}/rest/v1/${path}`;
  const headers = {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${SB_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation',
    ...opts.headers,
  };
  const res = await fetch(url, { ...opts, headers });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err || res.statusText);
  }
  return res.status === 204 ? null : res.json();
}

// ══════════════════════════════════════════════
//  FORMULAS
// ══════════════════════════════════════════════
function calcProductionQty(delivery, stockBegin, stockEnd) {
  return (Number(delivery)||0) + (Number(stockEnd)||0) - (Number(stockBegin)||0);
}
function calcNeededWorkers(rows) {
  // rows: [{production_qty, kpw}]
  return rows.reduce((sum, r) => {
    if (!r.kpw || r.kpw <= 0) return sum;
    return sum + (r.production_qty / r.kpw);
  }, 0);
}
function calcAvailableShifts(availableWorkers, workingDays) {
  return (Number(availableWorkers)||0) * (Number(workingDays)||0);
}
function calcAchievement(availableShifts, allIn, neededWorkers, allOut) {
  const denom = (Number(neededWorkers)||0) + (Number(allOut)||0);
  if (denom === 0) return null;
  return ((Number(availableShifts)||0) + (Number(allIn)||0)) / denom;
}
function calcPenalty(achievement) {
  if (achievement === null) return 0;
  return achievement < 0.99 ? (achievement - 0.99) * 300 : 0;
}
function calcVacationRatio(vacations, availableShifts) {
  if (!availableShifts) return 0;
  return (Number(vacations)||0) / availableShifts;
}

function switchView(v, btn) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`view-${v}`).classList.add('active');
  btn.classList.add('active');
  currentView = v;
  if (v === 'dash')  loadDashboard();
  if (v === 'hist')  loadHistory();
  if (v === 'score') loadScoreboard();
}

function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  setTimeout(() => t.className = '', 2500);
}

function achClass(a) {
  if (a === null || a === undefined) return 'nd';
  if (a >= 0.99) return 'ok';
  if (a >= 0.95) return 'warn';
  return 'crit';
}

function fmtAch(a) {
  if (a === null || a === undefined) return '—';
  return (a * 100).toFixed(2) + '%';
}

function fmtNum(n, dec=1) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toFixed(dec);
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function monthStr(d) {
  return d ? d.slice(0,7) : new Date().toISOString().slice(0,7);
}

function setOnlineStatus(online) {
  isOnline = online;
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot' + (online ? '' : ' offline');
  lbl.textContent = online ? 'LIVE' : 'OFFLINE';
}

window.addEventListener('online',  () => { setOnlineStatus(true);  flushQueue(); });
window.addEventListener('offline', () => setOnlineStatus(false));

// ══════════════════════════════════════════════
//  OFFLINE QUEUE
// ══════════════════════════════════════════════
function saveQueue() {
  localStorage.setItem('mobica_pending', JSON.stringify(pendingQueue));
}

async function flushQueue() {
  if (!isOnline || pendingQueue.length === 0) return;
  const item = pendingQueue[0];
  try {
    await upsertEntry(item);
    pendingQueue.shift();
    saveQueue();
    if (pendingQueue.length > 0) flushQueue();
    else showToast('Offline entries synced ✓', 'success');
  } catch(e) {
    console.error('Flush error', e);
  }
}

// ══════════════════════════════════════════════
async function loadDashboard() {
  const grid = document.getElementById('deptGrid');
  if (!isOnline && dashCache) { renderDash(dashCache); return; }
  grid.innerHTML = '<div class="spinner"></div>';
  try {
    const today = todayStr();
    const firstOfMonth = today.slice(0,7) + '-01';
    // Get latest entry per dept this month
    const rows = await sbFetch(
      `capacity_entries?entry_date=gte.${firstOfMonth}&entry_date=lte.${today}&select=*&order=entry_date.desc`,
      { headers: { 'Range-Unit':'items' } }
    );
    // Keep latest per dept
    const latestMap = {};
    (rows||[]).forEach(r => {
      if (!latestMap[r.department_code]) latestMap[r.department_code] = r;
    });
    dashCache = latestMap;
    renderDash(latestMap);
  } catch(e) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>Connection error<br><small>${e.message}</small></div>`;
    setOnlineStatus(false);
  }
}

function renderDash(latestMap) {
  const today = todayStr();
  document.getElementById('dashDate').textContent = 'As of ' + today;
  document.getElementById('dashPeriod').textContent = monthStr(today);

  // Summary
  const active = Object.keys(latestMap).length;
  const achs = Object.values(latestMap).map(r=>r.achievement).filter(a=>a!==null);
  const avgAch = achs.length ? achs.reduce((s,a)=>s+a,0)/achs.length : null;
  const totalPen = Object.values(latestMap).reduce((s,r)=>s+(Number(r.penalty)||0),0);

  document.getElementById('sumDepts').textContent = `${active}/8`;
  document.getElementById('sumAch').textContent = avgAch !== null ? fmtAch(avgAch) : '—';
  document.getElementById('sumPen').textContent = totalPen > 0 ? `${totalPen.toFixed(0)} LE` : '0';

  const grid = document.getElementById('deptGrid');
  grid.innerHTML = '';
  DEPTS.forEach(dept => {
    const r = latestMap[dept.code];
    const cls = r ? achClass(r.achievement) : 'nodata';
    const ach = r ? r.achievement : null;
    const vacRatio = r ? r.vacation_ratio : null;
    const vacWarn = vacRatio && vacRatio > 0.10;
    const pen = r ? (Number(r.penalty)||0) : 0;

    const card = document.createElement('div');
    card.className = `dept-card ${cls}`;
    card.onclick = () => { switchView('entry', document.querySelector('[data-view="entry"]')); selectDept(dept.code); };
    card.innerHTML = `
      <div class="dept-card-header">
        <div>
          <div class="dept-name">${dept.name}</div>
          <div class="dept-code">${dept.short} · ${r ? r.entry_date : 'No data this month'}</div>
        </div>
        <div class="ach-badge ${cls}">${fmtAch(ach)}</div>
      </div>
      <div class="dept-stats">
        <div class="stat-item"><div class="stat-label">Available</div><div class="stat-val">${r ? fmtNum(r.available_shifts) : '—'}</div></div>
        <div class="stat-item"><div class="stat-label">Needed</div><div class="stat-val">${r ? fmtNum(r.needed_workers) : '—'}</div></div>
        <div class="stat-item"><div class="stat-label">Workers</div><div class="stat-val">${r ? r.available_workers : '—'}</div></div>
      </div>
      ${(pen > 0 || vacWarn) ? `<div class="penalty-row">
        ${pen > 0 ? `<span class="penalty-tag">⚡ ${pen.toFixed(0)} LE penalty</span>` : ''}
        ${vacWarn ? `<span class="vacation-tag">🏖 Vac ${(vacRatio*100).toFixed(1)}%</span>` : ''}
      </div>` : ''}
    `;
    grid.appendChild(card);
  });
}

async function syncNow() {
  await flushQueue();
  await loadDashboard();
  showToast('Refreshed', 'success');
}

function initForm() {
  // Date default
  document.getElementById('fDate').value = todayStr();
  document.getElementById('fWorkDays').value = '';

  // Dept buttons
  const sel = document.getElementById('formDeptSelector');
  sel.innerHTML = '';
  DEPTS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'dept-sel-btn';
    btn.textContent = d.name;
    btn.dataset.code = d.code;
    btn.onclick = () => selectDept(d.code);
    sel.appendChild(btn);
  });

  // History dept filter
  const hf = document.getElementById('histDeptFilter');
  hf.innerHTML = '<option value="">All Departments</option>';
  DEPTS.forEach(d => {
    const o = document.createElement('option');
    o.value = d.code; o.textContent = d.name;
    hf.appendChild(o);
  });

  // Score month selector — last 12 months
  const sms = document.getElementById('scoreMonthSel');
  const now = new Date();
  for (let i=0; i<12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const val = d.toISOString().slice(0,7);
    const o = document.createElement('option');
    o.value = val; o.textContent = val;
    if (i===0) o.selected = true;
    sms.appendChild(o);
  }

  // History month default
  document.getElementById('histMonth').value = monthStr();

  // Live recalc on worker field changes
  ['fAvail','fWorkDays','fOT','fAllIn','fAllOut'].forEach(id => {
    document.getElementById(id).addEventListener('input', liveRecalc);
  });
}

function selectDept(code) {
  selectedDept = code;
  document.querySelectorAll('.dept-sel-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.code === code);
  });
  const dept = DEPTS.find(d=>d.code===code);
  document.getElementById('formDeptLabel').textContent = dept.name;
  renderModelTable(code);
  liveRecalc();
}

function renderModelTable(code) {
  const wrap = document.getElementById('modelTableWrap');
  const models = MODELS_BY_DEPT[code] || [];

  let html = `<table class="model-table">
    <thead><tr>
      <th style="text-align:left">Model / Variant</th>
      <th>KPW</th>
      <th>Delivery</th>
      <th>Stk Begin</th>
      <th>Stk End</th>
      <th>Prod Qty</th>
    </tr></thead><tbody>`;

  models.forEach((m, i) => {
    const [model, variant, kpw] = m;
    const label = variant ? `${model} · ${variant}` : model;
    const isTbd = kpw === null;
    html += `<tr class="${isTbd?'tbd-row':''}">
      <td>${label}${isTbd?' ⚠':''}</td>
      <td class="kpw-cell">${isTbd ? 'TBD' : kpw}</td>
      <td><input class="tbl-inp" type="number" min="0" step="1" data-i="${i}" data-f="del" placeholder="0" oninput="liveRecalc()"></td>
      <td><input class="tbl-inp" type="number" min="0" step="1" data-i="${i}" data-f="sb"  placeholder="0" oninput="liveRecalc()"></td>
      <td><input class="tbl-inp" type="number" min="0" step="1" data-i="${i}" data-f="se"  placeholder="0" oninput="liveRecalc()"></td>
      <td class="prod-cell" id="pq_${i}">—</td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function getModelRows() {
  if (!selectedDept) return [];
  const models = MODELS_BY_DEPT[selectedDept] || [];
  return models.map((m, i) => {
    const del = Number(document.querySelector(`[data-i="${i}"][data-f="del"]`)?.value||0);
    const sb  = Number(document.querySelector(`[data-i="${i}"][data-f="sb"]`)?.value||0);
    const se  = Number(document.querySelector(`[data-i="${i}"][data-f="se"]`)?.value||0);
    const pq  = calcProductionQty(del, sb, se);
    // Update cell
    const cell = document.getElementById(`pq_${i}`);
    if (cell) cell.textContent = pq !== 0 ? pq : '—';
    return { model_name: m[0], variant: m[1], kpw: m[2], delivery_qty: del, stock_begin: sb, stock_end: se, production_qty: pq };
  });
}

function liveRecalc() {
  const rows = getModelRows();
  const needed = calcNeededWorkers(rows);
  const avail  = Number(document.getElementById('fAvail').value)||0;
  const days   = Number(document.getElementById('fWorkDays').value)||0;
  const ot     = Number(document.getElementById('fOT').value)||0;
  const allIn  = Number(document.getElementById('fAllIn').value)||0;
  const allOut = Number(document.getElementById('fAllOut').value)||0;
  const vac    = Number(document.getElementById('fVac').value)||0;
  const avShifts = calcAvailableShifts(avail, days) + ot;
  const ach    = needed > 0 ? calcAchievement(avShifts, allIn, needed, allOut) : null;
  const pen    = calcPenalty(ach);
  const vacR   = calcVacationRatio(vac, avShifts);

  const cls = achClass(ach);
  document.getElementById('mNeeded').textContent  = needed.toFixed(1);
  document.getElementById('mAvail').textContent   = avShifts.toFixed(1);
  const achEl = document.getElementById('mAch');
  achEl.textContent = fmtAch(ach);
  achEl.className = `meter-val ${cls}`;
  document.getElementById('mPen').textContent     = pen !== 0 ? pen.toFixed(0) : '0';

  // Progress bar
  const bar = document.getElementById('achBar');
  const pct = ach !== null ? Math.min(ach * 100, 115) : 0;
  const color = cls==='ok' ? 'var(--green)' : cls==='warn' ? 'var(--warn)' : cls==='crit' ? 'var(--red)' : 'var(--text2)';
  bar.style.width  = pct + '%';
  bar.style.background = color;
}

function resetForm() {
  document.getElementById('fDate').value = todayStr();
  ['fWorkDays','fAvail','fOT','fAllIn','fAllOut','fVac','fNotes'].forEach(id => {
    document.getElementById(id).value = '';
  });
  selectedDept = null;
  document.querySelectorAll('.dept-sel-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('modelTableWrap').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2);font-size:12px;">Select a department to show models</div>';
  document.getElementById('formDeptLabel').textContent = 'Select department above';
  ['mNeeded','mAvail','mAch','mPen'].forEach(id => document.getElementById(id).textContent='—');
  document.getElementById('achBar').style.width='0%';
}

async function submitEntry() {
  if (!selectedDept) { showToast('Select a department', 'error'); return; }
  const date = document.getElementById('fDate').value;
  if (!date)  { showToast('Enter a date', 'error'); return; }
  const avail  = Number(document.getElementById('fAvail').value)||0;
  const days   = Number(document.getElementById('fWorkDays').value)||0;
  if (!avail || !days) { showToast('Enter available workers & working days', 'error'); return; }

  const rows   = getModelRows();
  const needed = calcNeededWorkers(rows);
  const ot     = Number(document.getElementById('fOT').value)||0;
  const allIn  = Number(document.getElementById('fAllIn').value)||0;
  const allOut = Number(document.getElementById('fAllOut').value)||0;
  const vac    = Number(document.getElementById('fVac').value)||0;
  const notes  = document.getElementById('fNotes').value.trim();

  const avShifts = calcAvailableShifts(avail, days) + ot;
  const ach    = needed > 0 ? calcAchievement(avShifts, allIn, needed, allOut) : null;
  const pen    = calcPenalty(ach);
  const vacR   = calcVacationRatio(vac, avShifts);

  const payload = {
    entry_date: date,
    department_code: selectedDept,
    available_workers: avail,
    actual_working_days: days,
    over_time_shifts: ot,
    all_in_shifts: allIn,
    all_out_shifts: allOut,
    vacations: vac,
    needed_workers: needed,
    achievement: ach,
    penalty: pen,
    vacation_ratio: vacR,
    submitted_by: 'PM',
    notes,
    model_rows_json: JSON.stringify(rows.filter(r=>r.delivery_qty>0||r.stock_begin>0||r.stock_end>0)),
  };

  if (!isOnline) {
    pendingQueue.push(payload);
    saveQueue();
    showToast('Saved offline — will sync when online', 'info');
    resetForm();
    return;
  }

  try {
    await upsertEntry(payload);
    showToast('Entry saved ✓', 'success');
    dashCache = null;
    resetForm();
  } catch(e) {
    showToast('Save failed: ' + e.message, 'error');
  }
}

async function upsertEntry(payload) {
  // Upsert into capacity_entries
  await sbFetch('capacity_entries', {
    method: 'POST',
    body: JSON.stringify(payload),
    headers: { 'Prefer': 'resolution=merge-duplicates,return=representation' },
  });
}

async function loadScoreboard() {
  const sc   = document.getElementById('scoreList');
  sc.innerHTML = '<div class="spinner"></div>';
  const month = document.getElementById('scoreMonthSel').value || monthStr();
  document.getElementById('scoreMonth').textContent = month;
  const from = month + '-01';
  const to   = month + '-31';

  try {
    const rows = await sbFetch(`capacity_entries?entry_date=gte.${from}&entry_date=lte.${to}&order=entry_date.desc`);

    // Latest per dept
    const latestMap = {};
    (rows||[]).forEach(r => { if (!latestMap[r.department_code]) latestMap[r.department_code] = r; });

    // Sort by achievement desc
    const sorted = DEPTS.map(d => ({ dept: d, r: latestMap[d.code] || null }))
      .sort((a,b) => {
        const aa = a.r ? (a.r.achievement||0) : -1;
        const bb = b.r ? (b.r.achievement||0) : -1;
        return bb - aa;
      });

    const totalPenalty = sorted.reduce((s,x)=>s+(x.r ? Number(x.r.penalty||0):0),0);

    sc.innerHTML = '';
    // Total penalty bar
    const ptag = document.createElement('div');
    ptag.style.cssText = 'background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;';
    ptag.innerHTML = `
      <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px">Total Monthly Penalty</div>
      <div style="font-family:var(--font-mono);font-size:18px;font-weight:700;color:${totalPenalty>0?'var(--red)':'var(--green)'}">
        ${totalPenalty>0 ? totalPenalty.toFixed(0)+' LE' : '✓ 0 LE'}
      </div>`;
    sc.appendChild(ptag);

    sorted.forEach((item, idx) => {
      const { dept, r } = item;
      const cls  = r ? achClass(r.achievement) : 'nd';
      const pen  = r ? Number(r.penalty||0) : 0;
      const row  = document.createElement('div');
      row.className = 'score-row';
      row.innerHTML = `
        <div class="score-rank">${idx+1}</div>
        <div>
          <div class="score-dept-name">${dept.name}</div>
          <div style="font-size:10px;color:var(--text2)">${r ? r.entry_date : 'No data'}</div>
        </div>
        <div class="score-ach ${cls}">${fmtAch(r?.achievement)}</div>
        <div class="score-pen${pen===0?' zero':''}">${pen>0 ? '-'+pen.toFixed(0)+' LE' : '—'}</div>`;
      sc.appendChild(row);
    });

  } catch(e) {
    sc.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}
